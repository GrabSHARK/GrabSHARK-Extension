name: Release GrabSHARK Extension

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Chromium Extension
        run: |
          chmod +x ./build.sh
          ./build.sh
          zip -r grabshark-extension-chromium-${{ github.ref_name }}.zip dist/

      - name: Build Firefox Extension
        run: |
          ./build.sh --firefox
          zip -r grabshark-extension-firefox-${{ github.ref_name }}.zip dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grabshark-extension-chromium-${{ github.ref_name }}.zip
            grabshark-extension-firefox-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
