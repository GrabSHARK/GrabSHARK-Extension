name: Release SPARK Extension

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./spark-extension

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './spark-extension/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Chromium Extension
        run: |
          chmod +x ./build.sh
          ./build.sh
          zip -r ../spark-extension-chromium.zip dist/

      - name: Build Firefox Extension
        run: |
          ./build.sh --firefox
          zip -r ../spark-extension-firefox.zip dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spark-extension-chromium.zip
            spark-extension-firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
